<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EOII Part 3 · 時事面試閃卡 — Kinny NG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#080812;--s1:#10101e;--s2:#16162a;--bd:rgba(255,255,255,.065);--tx:#dde4f0;--mt:#56647a;--tc:#3b82f6}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Noto Serif TC',Georgia,serif;min-height:100vh;padding:28px 16px 80px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.017;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px}
.wrap{max-width:700px;margin:0 auto;position:relative;z-index:1}

/* HEADER */
.hd{margin-bottom:24px}
.ey{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3.5px;color:var(--mt);text-transform:uppercase;margin-bottom:6px}
.ht{font-size:26px;font-weight:900;color:#f0f4ff;letter-spacing:-.5px;margin-bottom:4px}
.hsub{font-size:12px;color:var(--mt);font-family:'DM Mono',monospace}

/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.tb{padding:5px 12px;border-radius:20px;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#4a5568;transition:all .18s;letter-spacing:.2px}
.tb:hover{color:#94a3b8;border-color:rgba(255,255,255,.15)}
.tb.active{color:#fff;font-weight:700;border-color:var(--tc);background:color-mix(in srgb,var(--tc) 18%,transparent)}
.cnt{opacity:.55;font-size:10px}
.tb-all{color:#64748b}
.tb-all.active{color:#fff;background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}

/* META ROW */
.meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.mc{font-size:11px;color:var(--mt);font-family:'DM Mono',monospace}
.topic-tag{font-size:10px;font-family:'DM Mono',monospace;font-weight:700;padding:3px 10px;border-radius:8px;letter-spacing:.8px}

/* CARD */
.card{background:linear-gradient(150deg,var(--s1),var(--bg));border:1px solid var(--bd);border-radius:20px;padding:30px 32px;cursor:pointer;transition:border-color .25s,box-shadow .25s;margin-bottom:14px;min-height:200px;position:relative}
.card.revealed{min-height:auto}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.qnum{font-size:10px;color:#1e2a3a;font-family:'DM Mono',monospace}
.hint{font-size:10px;color:#1e2a3a;font-family:'DM Mono',monospace}
.qlabel{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mt);margin-bottom:10px;font-family:'DM Mono',monospace}
.question{font-size:18px;line-height:1.65;font-weight:700;color:#e2e8f0}
.divider{height:1px;margin:22px 0}
.alabel{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:12px;font-weight:700;font-family:'DM Mono',monospace}
.answer{font-size:14px;line-height:1.95;color:#a8b8cc;white-space:pre-line}
.answer strong, .answer b{color:#dde4f0}

/* KEYWORD CHIPS */
.kw-area{margin-top:16px;display:flex;flex-wrap:wrap;gap:6px}
.kw{display:inline-block;font-size:11px;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:6px;border:1px solid;opacity:.8}

/* CONTROLS */
.controls{display:flex;gap:8px;margin-bottom:10px}
.btn{flex:1;padding:11px 0;border-radius:12px;font-size:12px;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.3px;transition:all .18s;border:1px solid var(--bd);background:rgba(255,255,255,.04);color:#64748b}
.btn:hover{color:#94a3b8;border-color:rgba(255,255,255,.14)}
.btn:disabled{color:#1a2030;cursor:default;pointer-events:none}
.btn-flip{flex:2.2;font-weight:700;font-size:13px;color:#e2e8f0;background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14)}
.btn-speak.on{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35);color:#f87171}

/* RATING */
.rating{display:none;gap:8px;margin-bottom:12px;align-items:center}
.rl{font-size:11px;color:var(--mt);font-family:'DM Mono',monospace;white-space:nowrap}
.rb{flex:1;padding:8px 0;border-radius:10px;font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .18s;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);color:#475569}

/* PROGRESS PANEL */
.prog-btn{background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:10px;padding:7px 14px;color:var(--mt);font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;white-space:nowrap;margin-bottom:6px}
.pp{display:none;background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:18px 20px;margin-bottom:14px}
.pp h3{font-size:9px;letter-spacing:2.5px;color:var(--mt);font-family:'DM Mono',monospace;text-transform:uppercase;margin-bottom:12px}
.dots{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:12px}
.dot{width:20px;height:20px;border-radius:4px;font-size:8px;font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:#111;font-weight:700}
.dot.good{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.4);color:#10b981}
.dot.ok{background:rgba(245,158,11,.2);border-color:rgba(245,158,11,.4);color:#f59e0b}
.dot.bad{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.4);color:#ef4444}
.ps{display:flex;gap:16px;flex-wrap:wrap}
.ps span{font-size:11px;font-family:'DM Mono',monospace}

.footer{text-align:center;font-size:10px;font-family:'DM Mono',monospace;color:#1a2030;margin-top:12px}
@media(max-width:500px){.card{padding:22px 20px}.question{font-size:16px}.answer{font-size:13px}}
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
    <div class="hd">
      <div class="ey">EOII Interview Prep · Part 3</div>
      <div class="ht">時事面試閃卡</div>
      <div class="hsub">56 道模擬面試題 · 12 個主題 · 粵語作答</div>
    </div>
    <button class="prog-btn" onclick="togglePanel()">📊 <span id="dn">0</span>/<span id="tot">0</span></button>
  </div>

  <div class="filters">
    <button class="tb tb-all active" data-id="all" onclick="setFilter('all')">📋 全部 <span class="cnt" id="all-cnt"></span></button>
    <button class="tb" data-id="housing" style="--tc:#3B82F6" onclick="setFilter('housing')">🏠 房屋 <span class="cnt">8</span></button>
<button class="tb" data-id="birth" style="--tc:#EC4899" onclick="setFilter('birth')">👶 生育率 <span class="cnt">6</span></button>
<button class="tb" data-id="ageing" style="--tc:#F59E0B" onclick="setFilter('ageing')">👴 人口老化 <span class="cnt">5</span></button>
<button class="tb" data-id="northern" style="--tc:#8B5CF6" onclick="setFilter('northern')">🏙️ 北都 <span class="cnt">4</span></button>
<button class="tb" data-id="medfee" style="--tc:#EF4444" onclick="setFilter('medfee')">🏥 醫療收費 <span class="cnt">4</span></button>
<button class="tb" data-id="minwage" style="--tc:#10B981" onclick="setFilter('minwage')">💰 最低工資 <span class="cnt">3</span></button>
<button class="tb" data-id="ai" style="--tc:#06B6D4" onclick="setFilter('ai')">🤖 AI政府 <span class="cnt">5</span></button>
<button class="tb" data-id="ridehail" style="--tc:#F97316" onclick="setFilter('ridehail')">🚗 網約車 <span class="cnt">3</span></button>
<button class="tb" data-id="budget" style="--tc:#A855F7" onclick="setFilter('budget')">📊 財政預算 <span class="cnt">4</span></button>
<button class="tb" data-id="manpower" style="--tc:#F43F5E" onclick="setFilter('manpower')">🩺 醫護人手 <span class="cnt">4</span></button>
<button class="tb" data-id="labour" style="--tc:#84CC16" onclick="setFilter('labour')">👷 勞工政策 <span class="cnt">4</span></button>
<button class="tb" data-id="youth" style="--tc:#14B8A6" onclick="setFilter('youth')">🎓 青年發展 <span class="cnt">6</span></button>

  </div>

  <div class="meta">
    <span class="mc">第 <span id="cn">1</span> / <span id="ct">1</span> 題</span>
    <span class="topic-tag" id="ttag"></span>
  </div>

  <div class="card" id="card" onclick="flip()">
    <div class="card-top">
      <span class="qnum" id="qnum"></span>
      <span class="hint" id="hint">輕按顯示模範答案 ↓</span>
    </div>
    <div class="qlabel">❓ 面試問題</div>
    <div class="question" id="qt"></div>
    <div class="divider" id="dv" style="display:none"></div>
    <div class="alabel" id="al" style="display:none">✅ 模範答案</div>
    <div class="answer" id="at" style="display:none"></div>
    <div class="kw-area" id="kw" style="display:none"></div>
  </div>

  <div class="controls">
    <button class="btn btn-speak" id="bsp" onclick="handleSpeak()">🔊 聆聽</button>
    <button class="btn" id="bprev" onclick="prev()">← 上題</button>
    <button class="btn btn-flip" id="bfl" onclick="flip()">👁 顯示答案</button>
    <button class="btn" id="bnext" onclick="next()">下題 →</button>
  </div>

  <div class="rating" id="rating">
    <span class="rl">自評：</span>
    <button class="rb" id="rb-bad" onclick="mark('bad')">😰 唔記得</button>
    <button class="rb" id="rb-ok"  onclick="mark('ok')">🤔 差不多</button>
    <button class="rb" id="rb-good" onclick="mark('good')">😊 記住喇</button>
  </div>

  <div class="pp" id="pp">
    <h3>學習進度</h3>
    <div class="dots" id="dots"></div>
    <div class="ps" id="ps"></div>
  </div>
  <div class="footer">輕按卡片翻牌 · Esc 重置 · 每次洗牌隨機排列</div>
</div>

<script>
const CARDS=[
  {id:1,t:"housing",color:"#3B82F6",label:"🏠 房屋",q:`你認為香港房屋問題的根本原因係咩？政府有冇做到足夠？`,a:`香港房屋問題的根本原因可以從供求兩方面分析。

【供應不足】首先，土地供應長期落後於需求。從覓地到入伙往往需時十年以上，加上《城市規劃條例》的法定諮詢及上訴程序複雜，大幅拖慢發展步伐。現時政府未來五年（2026/27至2030/31年度）公營房屋目標約189,000個單位，比上屆任期目標增加近八成，方向正確，但落成時間仍難預測。

【需求龐大】另一方面，香港人口約750萬，公屋輪候宗數約115,700宗，輪候時間達5.1年，雖較高峰期的6.1年有所改善，但仍遠超其他先進地區。加上香港樓價置業負擔指數達收入中位數的13至15倍，遠超國際標準的三至五倍。

【政府表現】政府推出簡約公屋（目標30,000個，2027/28年前完成）及《簡樸房條例》（2026年3月生效，最低86平方呎）等措施，顯示積極態度。然而，簡約公屋每伙造價逾百萬，有批評指性價比存疑。我認為政府需要同時加快土地行政改革，才能從根本解決問題，而非只靠短期過渡措施。`},
  {id:2,t:"housing",color:"#3B82F6",label:"🏠 房屋",q:`《簡樸房條例》對解決劏房問題有幾大成效？你有咩睇法？`,a:`《簡樸房條例》於2026年3月1日正式生效，是政府規管分間單位（劏房）的重要一步，我認為方向正確但執行上仍有改善空間。

【正面影響】條例訂明最低居住面積為86平方呎（約8平方米），並要求符合採光、通風等基本標準。全港估計有約107,400個劏房，約20萬居民受惠。條例有助淘汰最惡劣的居住環境，提升基本居住質素。

【限制所在】然而，條例設有48個月的過渡期，即業主最遲2030年才需完成認證，意味大量居民在此期間仍需忍受惡劣環境。此外，條例只規管面積和設施，並非直接控制租金，居民租金負擔問題仍未解決。

【我的建議】我認為政府可以縮短過渡期至24個月，並同步加強執法資源，優先處理面積最小、情況最惡劣的劏房。與此同時，必須加快公營房屋供應，讓劏房居民有更快的出路，否則強制取締劏房只會令部分低收入人士無家可歸，變成另一個社會問題。`},
  {id:3,t:"housing",color:"#3B82F6",label:"🏠 房屋",q:`香港政府推出「簡約公屋」，你認為這是否解決公屋輪候問題的有效方法？`,a:`簡約公屋是一個回應短期迫切需求的過渡措施，有其價值但亦有局限，我對此持審慎支持的態度。

【政策內容】政府目標在2027/28年度前興建約30,000個簡約公屋單位，分布全港多區，提供予輪候公屋的申請者，平均居住年期約五年，每年可節省租金逾50,000元。

【優點】入住者毋須繼續輪候，可更快獲得穩定居所，同時可繼續計算公屋輪候時間。政府數字顯示，入住者平均輪候年期僅3.2年，較正常公屋輪候時間（現時5.1年）短。

【局限與批評】批評者指出，簡約公屋每伙造價逾百萬元，遠高於同類型過渡房屋，資源效益受質疑。而且這只是「過渡」安排，5年後仍需另找安置，只是推遲問題而非解決問題。

【我的總結】我認為在長遠公屋供應未能跟上的情況下，簡約公屋是必要的緩衝措施。但政府必須同時加快長遠公屋供應，確保五年後有足夠的永久公屋單位接收這批住戶，否則只是把問題推後。`},
  {id:4,t:"housing",color:"#3B82F6",label:"🏠 房屋",q:`你認為香港應否向新加坡組屋制度學習？`,a:`新加坡組屋制度確實值得香港借鑑，但需因應香港實際情況作出調整，不能照搬。

【新加坡的成就】新加坡約80%人口居住於政府興建的組屋，且住屋質素高、配套完善，絕大多數家庭擁有自置物業，不存在香港式的「輪候多年」問題。其建屋局（HDB）效率高，從規劃到落成時間較短。

【香港的分別】然而，兩地情況有根本分別。第一，新加坡人口約590萬，香港約750萬，但新加坡土地面積是香港的1.3倍，密度差異影響發展可行性。第二，新加坡是城市國家，政策統一執行較易；香港的土地用途轉換需符合《城市規劃條例》及多層諮詢程序。第三，新加坡政府擁有超過90%的土地，而香港大量土地歸私人所有，收地成本龐大。

【可借鑑之處】我認為香港可以借鑑新加坡的「置業階梯」概念：提供多種不同售價和面積的資助出售房屋，讓市民可以隨收入增長逐步向上流。現時居屋、綠置居的改革（如白居二增至7,000個、轉讓限制縮至10年）是朝正確方向的第一步。`},
  {id:5,t:"housing",color:"#3B82F6",label:"🏠 房屋",q:`面對香港人口老化，你認為安老政策與房屋政策應如何配合？`,a:`人口老化與房屋政策的配合是香港未來最迫切的跨政策議題之一，需要打破部門各自為政的局面。

【問題所在】現時65歲以上人口約157萬，佔21%，2039年將升至31%（約252萬人）。逾96%長者希望居家安老，但現有房屋供應並非專為年長者設計，輪椅使用者、行動不便長者的居住需求在普通公屋單位中難以得到滿足。

【政策配合建議】第一，在新建公屋項目中強制預留一定比例的無障礙及長者友善單位，配備扶手、低門檻設計及緊急召援系統。第二，「長者業主樓換樓計劃」讓年滿60歲業主可免補地價置換較小單位，方向正確，可騰出大單位予有子女的家庭，同時讓長者套現應付退休需要。第三，在興建安老院舍宿位方面，政府2025年施政報告只新增700個資助宿位，遠遠不足，建議在舊式公共屋邨原址重建時同步增設安老設施。

【結語】我認為安老政策與房屋政策的深層配合，關鍵在於建立「跨部門整合服務」模式，由一個統籌機構協調醫療、社福和房屋資源，讓長者在熟悉的社區中安老，而非被送往遠離家人的院舍。`},
  {id:6,t:"housing",color:"#3B82F6",label:"🏠 房屋",q:`香港政府的房屋政策如何平衡「置業」與「租住」的需求？`,a:`香港的房屋政策長期以「促進置業」為主導，但近年政府逐漸意識到租住市場的重要性，兩者需要更好地平衡。

【現時政策取向】政府一直以公屋租住及資助出售（居屋、綠置居）的「雙軌制」處理公營房屋需求。2026年施政報告調整居屋綠白表比例至50:50，並將轉讓限制縮短至10年，主要目的是促進更多公屋戶置業，從而騰空更多公屋單位供輪候者使用。

【置業vs租住的爭議】支持「置業主導」的人士認為，置業是家庭積累財富的主要途徑，有利社會穩定。反對者則指出，強迫市民置業在高樓價下只是製造「負資產」風險，並非人人都有能力或需要置業，特別是年輕的流動性較高人士。

【租務保障的缺失】現時私人租務市場缺乏全面的租金管制及租住保障，劏房居民面對業主任意加租或驅逐的風險。《簡樸房條例》只針對設施標準，並未處理租金保障問題。

【我的觀點】我認為政府應在維持置業機會的同時，加強租住保障，包括研究對私人租務市場引入更全面的保障機制，讓選擇租住的市民也有基本的居住安全感。`},
  {id:7,t:"housing",color:"#3B82F6",label:"🏠 房屋",q:`你對「北部都會區」作為解決土地問題的方案有何看法？`,a:`北部都會區是香港有史以來最大型的土地開發計劃，我認為它是解決土地問題的重要長遠策略，但需要正視多項執行挑戰。

【規模與潛力】北都總面積約3萬公頃，約佔香港三分之一，可提供約50萬個住宅單位。配合新田科技城（626公頃、創科用地210公頃）及河套香港園區（2025年12月開園），北都不只解決住屋問題，更是香港未來的創科及就業重心，預計完全落成後可提供逾30萬個職位，每年為GDP貢獻逾2,500億元。

【挑戰所在】然而，北都面對多項挑戰：第一，發展時間跨度長達20至30年，首批居民最早2031年遷入，遠水難救近火。第二，環保團體關注對鄰近后海灣拉姆薩爾濕地的影響，可能引發司法覆核，影響進度。第三，財政方面，2026預算案已從外匯基金轉撥1,500億元，加上大量債券發行，財政壓力龐大。

【總結】我支持北都作為長遠戰略，但政府需同時處理短中期供應（如加快現有發展項目），並確保北環線（最遲2034年）等基建配套按時完成，否則北都住宅單位難以吸引市民入住。`},
  {id:8,t:"housing",color:"#3B82F6",label:"🏠 房屋",q:`你認為增加「首置盤」供應是否足以解決青年置業困難？`,a:`增加首置盤是政府協助青年置業的重要措施，但我認為這並非解決問題的全部，需要與其他政策協同推行。

【現有措施】政府已推出白居二（增至7,000個，其中一半撥予40歲以下青年）、「家有初生」優先選樓計劃，以及最高九成按揭保險計劃，方向正確。

【問題的深層】然而，青年置業困難的核心不只是供應不足，更是「可負擔能力」（affordability）的問題。香港樓價與收入比率達13至15倍，即使青年以九成按揭購買300萬元的居屋，每月按揭供款仍可能佔收入50%以上，財務壓力極大，若遇到加息或失業，隨時陷入負資產危機。

【收入vs置業的矛盾】現時青年人的中位薪酬約18,000至22,000元，但資助房屋的申請入息上限（如居屋白表為個人57,500元）設計上已假設申請者有較高收入，真正低收入青年反而難以受惠。

【我的建議】除了增加首置盤供應，政府應同時研究「漸進式置業」制度，讓青年先以較低首期購入部分業權，隨收入增長再逐步增持，降低一次性置業的財務門檻，真正幫助最有需要的青年。`},
  {id:9,t:"birth",color:"#EC4899",label:"👶 生育率",q:`香港生育率持續下跌，你認為原因係咩？政府的$20,000獎勵金有效嗎？`,a:`香港生育率問題是一個複雜的社會結構性問題，2025年出生宗數僅31,714宗，為歷年新低，按年跌逾14%，2024年總和生育率只有0.841，遠低於人口替代水平的2.1。

【深層原因】第一，生活成本高昂——養育一名兒童至18歲的估算費用高達600萬元，包括房屋、教育、生活等開支，令許多年輕人卻步。第二，工時文化——香港僱員平均每週工時中位數約50小時，全球最長之一，令雙職家庭難以兼顧照顧責任。第三，晚婚趨勢——2025年婚姻登記宗數約28,000對，較2018年（50,000對）跌44%，生育窗口收窄。第四，價值觀轉變——現時選擇「雙職無孩」（DINK）的家庭比例達22%。

【$20,000獎勵金的成效】截至2025年底，政府已向61,758名申請人發放約12.35億元，可見有一定申請量。然而，對比養育成本600萬元，$20,000只是杯水車薪，難以改變生育決定。研究亦顯示，現金獎勵對高教育程度都市居民的生育意願影響極為有限——南韓自2006年花費逾2,000億美元，TFR仍在2023年跌至0.72，印證此點。

【真正有效的方向】更有效的措施應着重於減低生育的機會成本，包括強制帶薪陪產假、大幅增加全日制資助托兒服務、以及改善工時文化等結構性改革。`},
  {id:10,t:"birth",color:"#EC4899",label:"👶 生育率",q:`請問你對現時香港鼓勵生育政策有何評價？有何改善建議？`,a:`現時香港的鼓勵生育政策以財政誘因為主，但我認為力度和結構均不足，需要更全面的政策配套。

【現有政策評估】政府措施包括：$20,000新生嬰兒獎勵金、子女免稅額調高至140,000元（2026預算案）、「家有初生」優先選樓計劃，以及「二元乘車優惠」擴展至60至64歲長者（間接支援護老者）。方向雖正確，但整體力度不足，難以撼動根本趨勢。

【政策缺口】現行政策忽視了幾個關鍵層面：其一，只有22%的企業提供超越法例要求的家庭友善措施，反映職場文化仍不友善；其二，全日制資助托兒服務名額嚴重不足，0至3歲嬰幼兒的照顧服務尤為缺乏；其三，現行法定產假14週（5天陪產假），對比多國（如北歐各國父親可享3至6個月帶薪假期）差距懸殊。

【建議】第一，立法強制企業提供至少10天帶薪陪產假，並由政府補貼成本，打破男主外女主內的育兒分工。第二，大幅擴展0至3歲全日制資助托兒服務，目標覆蓋率達50%（現時不足10%）。第三，設立「家庭友善僱主認證」，在政府採購中優先考慮獲認證的僱主，以市場機制推動企業改變。第四，研究引入「家庭商數」稅制，子女愈多稅務優惠愈大，讓生育成本真正被稅制考慮。`},
  {id:11,t:"birth",color:"#EC4899",label:"👶 生育率",q:`香港低生育率對長遠社會有何影響？政府應如何應對？`,a:`香港低生育率（TFR僅0.841）的深遠影響是多方面的，若不積極應對，將對社會可持續性構成嚴峻威脅。

【人口結構影響】第一，勞動力萎縮——現時每名長者由約5名勞動人口供養，2041年將降至不足2名，令公共財政承受巨大壓力。2040年老齡開支預計佔政府經常開支55%，較現時的36%大幅上升。第二，稅基收窄——勞動人口減少意味薪俸稅、利得稅等收入下降，影響政府提供公共服務的能力。第三，經濟活力下降——創業、創新、消費等均依賴年輕人口，老齡化社會往往伴隨經濟增長放緩。

【政府應對策略】可從三個方向着手：其一，「開源」（鼓勵生育）——短期效果有限但必要，見前述討論；其二，「引進」（人才輸入）——通過「高才通」、「優才計劃」引入外地人才，2026年研究生資助名額已擴至8,500個，政策方向正確；其三，「活化」（提升長者及婦女勞動參與）——香港長者勞動參與率僅13.9%，遠低於內地25%及挪威22.2%，有極大提升空間。

【我的看法】我認為人口問題沒有速效藥，政府需要制訂清晰的20年人口策略，包括設定生育率、人才引進及勞動參與的具體目標，而非各項政策零散推行，才能有效應對這一長遠挑戰。`},
  {id:12,t:"birth",color:"#EC4899",label:"👶 生育率",q:`香港的托兒服務是否足以支援職場父母？你認為應如何改善？`,a:`香港托兒服務嚴重不足，是制約生育率和女性勞動參與的重要因素，需要大幅投入改善。

【現狀不足】現時0至3歲全日制資助托兒服務名額嚴重短缺，輪候時間長達一至兩年，令許多父母在嬰兒出生後，其中一人（通常是母親）被迫辭職或轉做兼職。托兒費用亦高昂，私人托兒中心月費動輒7,000至15,000元，令雙職家庭吃不消。

【政策建議】第一，大幅增加政府資助托兒服務名額，目標2030年前將0至3歲嬰兒的服務覆蓋率由現時不足10%提升至30至40%，參考北歐國家（如瑞典覆蓋率逾70%）的成功經驗。第二，在全港各區學校及社區設施附設「鄰里托兒服務」，讓父母可就近接送，減低交通負擔。第三，參考法國政府的「托兒服務補貼」制度，為低中收入家庭提供最高七成的托兒費用補貼，讓工作收益高於托兒費用，才有誘因維持就業。

【企業責任】政府亦可透過稅務誘因鼓勵大型企業提供或資助員工托兒，如允許相關開支作額外扣稅。統計顯示，目前只有22%的企業提供超越法例要求的家庭友善措施，反映政策推動的必要性。`},
  {id:13,t:"birth",color:"#EC4899",label:"👶 生育率",q:`你認為吸引外來人口移居香港是否可以解決人口老化問題？`,a:`吸引外來人口是應對人口挑戰的重要策略，但它只是「補充」而非根本「解決方案」，需要搭配其他政策同步推進。

【人才輸入的成效】政府近年積極推行「高才通」（高端人才通行證計劃）、「優才計劃」等，截至2025年底，各人才計劃合計批出逾40萬個申請，反映政策具吸引力。2026預算案亦宣布本地研究生資助名額擴至8,500個，吸引更多内地及海外學生在港就讀並留港工作。

【局限所在】然而，人才輸入有其結構性局限。第一，引入的主要是高技術人才，未必能補充基層勞動力的缺口。第二，輸入人口的適應期、子女教育、及房屋需求，會帶來額外的社會資源壓力。第三，新移民是否真正定居、生育、退休後留港，存在不確定性——若只是「借港」工作，對人口問題的實際貢獻有限。

【輸入勞工的爭議】2023年推出的「輸入勞工計劃」引入建造業及運輸業外勞，惟遭本地工人強烈反對，認為影響本地就業機會。可見人口輸入政策涉及複雜的社會利益平衡，不能只從人口數字考慮。

【我的觀點】我認為香港應確立清晰的人口政策框架，就不同類型的外來人口（高端人才、一般勞工、家庭來港）制訂分類政策，並確保輸入人口能夠真正融入香港社會，成為長期的社區成員。`},
  {id:14,t:"birth",color:"#EC4899",label:"👶 生育率",q:`南韓大量投資鼓勵生育但失敗，香港可以從中學到什麼教訓？`,a:`南韓的案例是全球生育政策最具警示性的例子，香港絕對應該認真汲取教訓，避免重蹈覆轍。

【南韓的教訓】南韓自2006年至2023年，花費約280兆韓圜（相當於逾2,000億美元）於各類生育鼓勵措施，包括現金獎勵、托兒補貼、稅務優惠等，結果TFR在2023年仍跌至0.72，成為全球最低，部分城市如首爾更只有0.59。可見，即使大規模投入財政資源，若未能改變深層的社會結構，效果依然有限。

【失效原因分析】南韓政策失效的主要原因：第一，教育競爭文化（「教育狂熱」）令養育成本以指數上升，財政補貼追不上；第二，職場文化極度不友善，長工時、女性就業歧視令母親難以維持事業；第三，房屋成本高昂，首爾樓價與收入比率與香港相若。這三個因素香港同樣存在。

【香港的啟示】香港應避免將有限資源投放於「直接現金」的形式，轉而聚焦於「降低生育的隱性成本」——即工時保障、托兒服務、住屋支援等結構性改革。更重要的是，要改變社會對「成功」的定義，讓年輕人覺得組織家庭是可以實現的選擇，而非犧牲事業的代價。`},
  {id:15,t:"ageing",color:"#F59E0B",label:"👴 人口老化",q:`香港人口老化問題嚴峻，你認為政府在安老政策上的最大缺口係咩？`,a:`香港人口老化問題確實嚴峻。2023年65歲以上人口已達157萬，佔21%，2039年將升至31%（約252萬人），現時每名長者由約5名勞動人口供養，2041年將降至不足2名，財政壓力極大。

【最大政策缺口——長期護理融資】我認為最大的缺口是缺乏可持續的「長期護理融資制度」。現時安老開支主要由政府一般稅收承擔，2040年老齡開支預計佔政府經常開支55%，比現時的36%大幅上升，在勞動人口萎縮的情況下，此模式難以持續。日本（1997年）、德國、荷蘭均已推行「強制性長期護理保險」（LTCI），由僱員、僱主及政府三方供款，建立獨立基金，香港學界已多次建議仿效，但政府至今未有積極回應。

【第二大缺口——服務質素監管】私營安老院舍佔全港約六成，但服務質素參差，現有監管機制（安老院條例）多年未更新。資助院舍輪候時間平均逾3至4年，部分長者在等候期間離世。

【第三大缺口——護老者支援不足】雖然政府每年撥款5億支援護老者，但相對照顧壓力而言仍屬杯水車薪，護老者的精神健康問題備受忽視。

【建議】政府應盡快啟動長期護理融資制度的公眾諮詢，配合擴大社區照顧服務券（現已增至16,000張），才能真正應對未來需求。`},
  {id:16,t:"ageing",color:"#F59E0B",label:"👴 人口老化",q:`你對「居家安老」的政策方向有何看法？如何落實？`,a:`「居家安老為本，院舍照顧為輔」是我認為正確的政策方向，逾96%的長者亦希望在熟悉的社區中生活。但要真正落實「居家安老」，需要多項配套措施的協調配合。

【現有政策】政府在居家安老方面已有一定投入：社區照顧服務券增至16,000張，讓長者自選照顧服務供應者；長者醫療券獎勵計劃延長至2028年底，鼓勵使用基層醫療；「二元乘車優惠」擴展至60至64歲，促進長者外出及社會參與；2025年施政報告亦新增3個長者鄰舍中心，每年服務約3,000名長者。

【落實挑戰】然而，居家安老的真正落實面對幾個核心挑戰：第一，現有公屋並非為長者設計，缺乏無障礙設施，樓梯式舊型屋邨對行動不便長者尤為不利；第二，社區照顧服務的質素監管不足，申訴機制不完善；第三，獨居長者的社交孤立問題難以靠服務券解決，需要建立社區連繫網絡。

【我的建議】政府應推動「長者友善社區」計劃，將無障礙設施翻新、基層醫療服務、社區照顧及社交活動整合成一站式平台，並利用科技（如緊急召援裝置、遙距監察）讓長者可以更安全獨立地居於社區。`},
  {id:17,t:"ageing",color:"#F59E0B",label:"👴 人口老化",q:`你認為香港應否提高退休年齡以應對人口老化問題？`,a:`提高退休年齡是一個具爭議的政策選項，但我認為在人口老化的背景下，這是值得認真討論的方向，惟需配合完善的配套措施。

【支持提高退休年齡的理由】香港男女性平均壽命分別為82.8歲及88.2歲，全球最長之一，但現行公務員退休年齡為60至65歲，退休後可能仍有20至30年的健康生活年期。延遲退休有助增加勞動人口供應，緩解工作年齡人口萎縮問題——現時每名長者由5名勞動人口供養，2041年降至不足2名。香港長者勞動力參與率只有13.9%，遠低於內地25%及挪威22.2%，提升空間巨大。

【反對聲音的顧慮】然而，勞工界有合理的憂慮：第一，體力勞動行業（如清潔、建築）的長者難以延長工作年期；第二，若沒有強制反年齡歧視立法，延遲退休可能令長者即使願意工作也找不到職位；第三，此政策或令年輕人晉升受阻，加劇世代矛盾。

【我的建議】我認為不應強制提高退休年齡，而應以「彈性退休」取代「一刀切」——讓長者自行決定何時退休，並提供再培訓及就業支援，同時立法明確禁止年齡歧視，創造讓長者願意繼續工作的環境。`},
  {id:18,t:"ageing",color:"#F59E0B",label:"👴 人口老化",q:`安老院舍服務質素參差，你認為政府應如何加強監管？`,a:`安老院舍服務質素問題一直是社會關注焦點，特別是在新冠疫情期間，多間私營院舍出現嚴重事故後，公眾對監管的要求更為迫切。

【現時監管架構的問題】現行《安老院條例》訂明了若干基本要求，但被批評為標準過低且未能追上時代。社署負責定期視察，但人手有限，視察頻率不足。投訴機制不完善，院友反映意見的渠道有限。部分私營院舍以牟利為主，為壓低成本而削減人手或食物質素。

【改善建議】第一，訂立法定的人手比例標準，包括護士、護理員與院友的最低比例，並強制全24小時覆蓋，避免現時深夜時段人手嚴重不足的情況。第二，引入「院舍評級制度」，如餐廳的衛生評級，讓公眾清楚了解各院舍的服務水平，形成市場壓力。第三，加強「突擊視察」，增加社署視察頻率，並引入獨立第三方（如社福機構）參與監察。第四，設立院友「聲音委員會」，確保院友可以直接反映意見，不受管理層干預。

【配套資助】提高監管標準的同時，政府需要相應增加資助院舍的撥款，否則資助院舍難以達標，只會令入住更困難。`},
  {id:19,t:"ageing",color:"#F59E0B",label:"👴 人口老化",q:`大灣區安老計劃是否切實可行？對香港長者有何利弊？`,a:`大灣區安老計劃是政府近年提出的創新政策選項，對部分長者確有吸引力，但需正視多項現實挑戰，不宜過分樂觀。

【潛在優點】大灣區城市（如中山、惠州、江門等）生活成本較香港低50至70%，安老院舍環境更寬敞，且較容易獲得宿位。對有特定需要（如回鄉養老）的長者而言，大灣區安老是真實的選擇。政府已透過「廣東計劃」及「福建計劃」為在港申領高齡津貼的長者提供跨境領取安排，為擴展至安老服務奠定基礎。

【現實挑戰】然而，大灣區安老面臨多個根本障礙：第一，港式醫療服務不兼容——長者若在大灣區居住，將無法繼續享有香港的公立醫院低廉費用，而大灣區的醫療質素及藥物供應未必完全符合長者需要；第二，社會福利屬地化——公共福利金、綜援等一旦離港，可能失去部分資格；第三，語言及文化差異——部分長者不習慣普通話環境，會增加適應困難；第四，家庭聯繫——大多數長者的子女仍在香港工作，跨境探望不便，家庭分離對長者心理健康有負面影響。

【我的立場】大灣區安老可以作為一個「自願性補充選項」，讓有意願的長者有多一個選擇，但政府不應將此作為解決香港安老服務不足問題的主要方案，根本解決仍需在港增加服務供應。`},
  {id:20,t:"northern",color:"#8B5CF6",label:"🏙️ 北都",q:`北部都會區對香港的創科發展有何重要性？你如何評價其進展？`,a:`北部都會區（北都）是香港發展創科產業的最重要空間策略，其意義在於打破過去香港科技發展「地少擠逼」的根本限制。

【戰略重要性】新田科技城規劃總面積626公頃，其中創科用地210公頃，相當於約17個香港科學園，為香港有史以來最大的創科土地預留。北都聚焦四大支柱產業：生命健康科技、微電子、新能源及人工智能。配合河套香港園區（2025年12月22日開園），北都可建立與深圳直接連接的創科走廊，打造國際研發重地。政府估計北都完全落成後，每年GDP貢獻逾2,500億元，提供超過30萬個職位。

【進展評估】2026預算案為河套及新田各注資100億元，資金來自外匯基金轉撥的1,500億元，反映政府財政承擔。河套園區出租率已達約八成，初步顯示市場信心。港投公司至今投資超過190個項目，逾20間公司籌備今年上市。

【挑戰所在】主要挑戰包括：第一，首批居民最早2031年遷入，發展時程漫長；第二，北環線最遲2034年才完成，交通配套滯後；第三，環保爭議——鄰近后海灣濕地的發展可能引發法律挑戰；第四，港深政策協同的複雜性，歷史上跨境合作往往難以落實。

【我的看法】北都潛力巨大，但能否成功，最終取決於執行力、基建配套的落實速度，以及能否真正吸引和留住頂尖科技人才。`},
  {id:21,t:"northern",color:"#8B5CF6",label:"🏙️ 北都",q:`香港的「河套深港科技創新合作區」對香港有何獨特優勢？`,a:`河套深港科技創新合作區是香港唯一可以「一地兩制」試驗創科監管創新的特殊地帶，其獨特性在全球幾乎找不到對應。

【獨特定位】河套香港園區面積約87公頃，2025年12月22日正式開園，毗鄰深圳福田，是全球唯一一個在兩個不同法律制度的城市之間共同開發的科技創新區。香港側可保持普通法制度、知識產權保護及數據私隱框架，同時讓科技人員輕鬆往來深圳側，獲取內地龐大的算力資源和市場試驗場。

【政策優勢】河套享有「監管沙盒」特殊安排，包括允許特定科技產品（如AI醫療、基因治療）在兩地同步進行監管審批，大幅縮短上市時間。這對生命科技企業尤為吸引——內地市場規模龐大，而香港的監管標準獲國際認可，兩者結合是極大的商業優勢。

【目前成果】2026預算案注資100億元，園區出租率約八成，進駐企業包括多家頂尖生命科技、AI及新材料研究機構。港府目標吸引更多跨國研發機構在港深兩地建立雙總部。

【挑戰】數據跨境流通的監管障礙尚未完全解決；香港的研究成果在內地商業化仍需通過複雜的監管程序，是現實中的最大制約。`},
  {id:22,t:"northern",color:"#8B5CF6",label:"🏙️ 北都",q:`北都發展對現有新界北部居民有何影響？政府應如何處理？`,a:`北都發展涉及大規模土地收回及居民遷置，是整個計劃中最具爭議的社會影響部分，需要以高度尊重和公平對待受影響社群。

【影響範圍】北都發展面積約3萬公頃，涉及古洞北、粉嶺北、洪水橋/厦村、元朗南等多個發展區。受影響的包括：原居民（享有丁屋權利的村落）、棕地作業者（新界現有約1,600公頃棕地上的回收、貨倉等行業，僱員逾萬人）、農戶（傳統農業用地）及現有村落居民。

【收地補償爭議】現行的法定補償機制以「現有用途」估值，批評者認為未能反映土地的發展潛力，原居民及土地持有人常覺得補償不公。棕地作業者的安置問題尤為複雜，若無合適的遷置地點，整個行業可能從香港消失，對本港低技術勞動市場造成衝擊。

【環保爭議】北都部分發展地帶鄰近后海灣拉姆薩爾濕地，環保團體擔憂濕地填平及開發會影響候鳥及生態。政府雖承諾在北都「保育區」增加濕地面積，但爭議持續。

【政府的責任】我認為政府必須確保：收地補償公平反映市場價值；為棕地作業者提供合適的棕地整合區以繼續運作；設立清晰的諮詢機制讓受影響居民表達意見；並切實落實生態補償承諾。只有公平處理這些問題，北都計劃才能得到廣泛的社會認受性。`},
  {id:23,t:"northern",color:"#8B5CF6",label:"🏙️ 北都",q:`你認為北部都會區能否讓香港年輕人受益？有何具體機遇？`,a:`北都對年輕一代確實充滿機遇，但要讓年輕人真正受益，需要有針對性的政策配套，而非僅靠市場自然發展。

【住屋機遇】北都計劃長遠提供約50萬個住宅單位，包括大量公營房屋及資助出售房屋，可望緩解香港整體住房供應不足的問題，惟首批居民最早2031年遷入，對目前急需住屋的青年幫助有限。白居二增至7,000個（一半撥予40歲以下），可讓部分青年較快受惠。

【就業機遇】北都四大支柱產業（生命健康科技、微電子、新能源、AI）均對高學歷年輕人才需求殷切。政府估計北都完全落成後可提供逾30萬個職位，若本地培訓的年輕人能夠配對這些職位，將大幅改善青年的就業前景和向上流動機會。

【教育機遇】北都大學教育城預留約90公頃用地，牛潭尾46公頃，計劃容納包括第三所醫學院在內的高等教育設施，可增加本地大學學位供應，讓更多年輕人有機會接受高等教育。

【要讓青年真正受益的條件】然而，機遇能否轉化為現實，取決於：大學和職業培訓課程能否及時配合北都的產業需求；基建（北環線最遲2034年）能否準時完成方便通勤；以及資助房屋政策能否確保一般收入的年輕人真正有能力購買或租住北都的房屋，而非被私人市場的高房價阻隔在外。`},
  {id:24,t:"medfee",color:"#EF4444",label:"🏥 醫療收費",q:`你如何評價2026年1月實施的公營醫療收費改革？`,a:`2026年1月1日實施的公營醫療收費改革是香港醫療政策的重要里程碑，我認為方向正確，但執行細節仍有改善空間。

【政策內容】主要調整包括：急症室第三至五類由$180升至$400（第一、二類危殆危急豁免）；普通科門診由$50升至$150；專科門診劃一$250（舊首次$135/覆診$80）；住院日費由$12升至$300（加幅25倍）；同時設有全年$10,000封頂機制，適用於所有香港居民毋須審查，並將減免受惠人數由30萬擴至140萬。

【正面評價】此次改革的核心邏輯清晰：現行公營醫療資助率高達97.6%，遠高於其他地區，令公院承受超負荷的輕症求診壓力，而穩定新症輪候時間最長達180星期（約3年半）。適度提高收費，配合全年封頂及擴大減免，可引導輕症患者轉用私家醫生，騰出公院資源服務真正有需要的病人。政府承諾所有收入全數投放回公營醫療，理念正確。

【批評與改善建議】住院日費由$12升至$300，加幅達25倍，對長期病患（尤其長者）影響可能最大，雖有$10,000封頂保護，但申請減免的程序應更簡化。更重要的是，收費改革只是「治標」——若醫護人手不增加，即使分流部分輕症，公院的根本壓力仍難緩解。`},
  {id:25,t:"medfee",color:"#EF4444",label:"🏥 醫療收費",q:`公私營醫療嚴重失衡，你認為應如何解決？`,a:`公私營醫療失衡是香港醫療體系最核心的結構性問題，約四成醫生（6,500名）在公院照顧全港近九成病人，是不可持續的。

【失衡成因】失衡的根本原因是公私診金差距過大：公院專科門診新收費為$250，私家專科診費動輒$1,000至$3,000以上，令有能力付費的市民也傾向使用公院。公院醫生起薪約$75,000至$90,000，遠低於私家醫生或私家醫院的薪酬，令公院持續流失人才——近三年逾1,200名醫生及7,300名護士以非退休方式離職。

【短期解決方案】今次醫療收費改革（如專科門診$250），加上「慢病共治計劃」（2023年底推出，分流高血壓及糖尿病等慢性病患者至私家診所），是近年最直接的分流措施。「基層醫療健康藍圖」推動「家庭醫生」作為市民的「健康守門人」，有助從源頭減少對公院的依賴。

【長遠解決方向】我認為解決公私失衡需要多管齊下：第一，大幅增加醫護培訓（醫科學額增至每屆650個），並加快落實北都第三所醫學院；第二，改善公院薪酬及工作條件，減低流失率；第三，研究強制性醫療保險，建立獨立的醫療融資機制，減低對政府直接補貼的依賴；第四，推動費用透明度立法，讓私家醫療市場更具競爭性，縮窄公私費用差距的隱性障礙。`},
  {id:26,t:"medfee",color:"#EF4444",label:"🏥 醫療收費",q:`你認為香港應否引入全民健保制度？`,a:`全民健保是香港醫療融資改革的長期爭議議題，我認為方向值得研究，但需謹慎設計以符合香港的獨特情況。

【全民健保的優點】台灣全民健保制度（1995年推行）被多次引用為成功案例：覆蓋99%人口，由僱員、僱主及政府三方供款，減低對一般稅收的單一依賴，財政相對可持續。能夠建立獨立的醫療融資池，使醫療資源分配更公平，亦可減低香港現時公私嚴重失衡的問題。

【實施挑戰】然而，在香港推行全民健保面對獨特挑戰：第一，香港的低稅率制度是重要的競爭優勢和社會契約，引入強制供款（實質上等同增稅）需要廣泛社會共識；第二，健保制度的設計複雜，如供款水平、給付範圍、私家醫療的定位等，任何細節失誤均可影響成效；第三，現時香港公私醫療發展不均，在制度未完善前推行健保，可能令私家醫療費用急速上升，反而令市民受損。

【政府的取態】政府至今未有明確表態支持或反對全民健保，《醫療改革諮詢》（2008年）及後續文件均曾提及不同方案，但未有落實。現時的方向是加強基層醫療分流（慢病共治計劃、醫療券等），作為過渡措施。

【我的觀點】我認為香港長遠有必要探索更可持續的醫療融資機制，可以先就不同模式（包括自願性醫療保險補貼、強制性健保等）進行深入研究和廣泛諮詢，再作決定。`},
  {id:27,t:"medfee",color:"#EF4444",label:"🏥 醫療收費",q:`如果你的部門負責推廣新公營醫療收費安排，你會如何向市民溝通這項政策？`,a:`作為負責推廣新公營醫療收費安排的公務員，我認為有效的政策溝通需要考慮清晰度、可及性及回應市民關切這三個核心原則。

【首先，釐清核心訊息】在對外溝通之前，我會先確保自己完全理解政策的重點：費用調整的幅度（如急症室第三至五類$180升至$400）、$10,000全年封頂機制的運作方式、減免資格及申請程序，以及所有收入投放回公營醫療的承諾。只有自己清楚，才能向市民清晰解釋。

【多元化宣傳策略】我會建議採用多個渠道：第一，以不同語文（廣東話、普通話、英語）製作清晰的宣傳單張及短片，重點說明費用變化及如何申請減免；第二，與社區中心、長者鄰舍中心及地區康健中心合作，派員進行面對面解說，特別針對長者及低收入人士等最關注收費的群體；第三，利用「1823」熱線及WhatsApp等數碼渠道解答市民查詢，確保資訊傳達雙向而非單向。

【回應公眾關切】我預計公眾最大的關注是住院費大幅提升（由$12至$300）及申請減免的程序。我會確保在宣傳中主動說明：大多數有需要的市民均可獲豁免或只需支付有限費用，並簡化申請程序（如以電子方式申請），讓市民放心。

【跟進及評估】政策推行後，我會建議定期收集市民的意見和反應，並向上級匯報，若有需要則調整宣傳策略。`},
  {id:28,t:"minwage",color:"#10B981",label:"💰 最低工資",q:`你對香港最低工資「一年一檢」的新機制有何評價？`,a:`香港最低工資的審查機制由「兩年一檢」改為「一年一檢」，是近年勞工政策的重要進步，我對此持正面評價。

【新機制內容】2025年完成立法，新審查機制採用「可加不減」原則，以通脹（CPI-A）加上經濟增長因素（上限1%）作為計算基礎。2026年5月1日起，最低工資由$42.1升至$43.1/小時，加幅2.38%。

【正面意義】「可加不減」確保最低工資不會因個別年份的經濟波動而被削減，為低薪工人提供更可預測的薪酬保障。「一年一檢」讓工資水平能更即時反映通脹，避免出現過去「兩年一檢」期間，工資追不上通脹、實質購買力下降的情況。

【局限之處】然而，批評者（如樂施會）指出，即使以新機制計算，現行最低工資$43.1/小時對比養活家庭的「生活工資」（估算約$61.5/小時）仍有相當大的差距。更重要的是，現行最低工資水平比綜援水平低約18.6%，即全職工作的收入仍低於社會援助水平，「工窮」問題未有根本解決。

【更大的缺口——標準工時】最低工資的保障與否，亦受工時影響。現時香港缺乏標準工時立法，工時過長（每週工時中位數約50小時）令部分工人的實際時薪在扣除超時後低於表面水平。我認為標準工時與最低工資政策應同步推進，才能真正保障低薪工人的生活水平。`},
  {id:29,t:"minwage",color:"#10B981",label:"💰 最低工資",q:`你認為現時$43.1的最低工資是否足夠？勞工界倡議的「生活工資」概念是否可行？`,a:`這是一個牽涉社會公義、經濟效益及政策可行性的複雜議題，需要多角度分析。

【現狀評估】現行最低工資$43.1/小時（2026年5月起），以每月工作176小時計算，月薪約$7,591。這一水平比綜援水平（包括租金補貼）低約18.6%，意味着按最低工資全職工作，收入仍不足以維持基本生活，令人質疑最低工資制度的原意。對比1995年（首次實施時$28/小時），15年間累計加幅約53.9%，但同期通脹及生活成本的升幅更大。

【生活工資概念的優點】樂施會等機構提倡的「生活工資」（$61.5/小時）以實際生活成本（包括住房、食物、交通、教育等基本開支）計算，目的是讓全職工作者能夠維持有尊嚴的基本生活，概念上比「防止惡性剝削」的最低工資更進一步，更貼近社會公義的理想。

【可行性挑戰】然而，由$43.1直接跳升至$61.5（加幅約43%），對中小企業（尤其是飲食、零售、清潔等勞動密集行業）的衝擊是現實存在的，可能導致裁員、提前退場或物價上升，影響整體消費市場。

【我的立場】我認為政府應訂立「分階段達標計劃」，設定在特定年份（如2030年）達到生活工資水平，並同步提供對小微企的過渡支援，令政策具有清晰方向但避免急速衝擊。`},
  {id:30,t:"minwage",color:"#10B981",label:"💰 最低工資",q:`連續性合約由「418」改為「468」對工人有何影響？你的評價如何？`,a:`連續性合約門檻的改變，是近年最實質影響工人法定福利的勞工政策調整，我認為方向正確但成效仍有限。

【政策內容】2026年1月1日起，連續性合約門檻由「418」（每4週工作18小時或以上）改為「468」（每4週工作68小時或以上）。達到連續性合約的僱員，可享有多項法定福利，包括：有薪年假、病假假期、遣散費、長期服務金等。

【正面影響】「468」門檻較「418」提高，意味更多兼職僱員（如每週工作超過17小時者）可獲法定保障，估計受惠人數增加約10至15萬人。對很多基層服務業工人（如超市收銀員、清潔工人）而言，這是實質的法定保障改善。

【仍有不足之處】批評者指出，相比國際水準，香港的勞工保障仍屬偏低。英國的連續性僱用門檻僅需工作1個月即可獲得部分保障，歐盟多國更採用「所有僱員均受保障」的普及原則。此外，對自僱人士和零工經濟工作者（如外賣員、網約車司機），現行勞工法例完全不適用，是日益增長的勞工保障缺口。

【更深層的問題】即使提高了連續性合約門檻，若沒有有效的執法，僱主仍可能以安排「467小時」規避，或以非正式僱傭方式避開法律規定。加強勞工處的執法資源，才是確保政策成效的關鍵。`},
  {id:31,t:"ai",color:"#06B6D4",label:"🤖 AI政府",q:`你認為香港在人工智能發展方面的競爭優勢和劣勢各係咩？`,a:`香港在AI發展上具備獨特優勢，但亦面對不容忽視的競爭挑戰，需要揚長補短。

【競爭優勢】第一，人才密度——香港的IMD世界人才排名全球第4，人均AI人才密度全球約第3位。多所香港大學在機器學習、自然語言處理領域達到國際頂尖水準。第二，金融科技生態——香港作為全球三大金融中心，金融機構對AI應用（如風險評估、反洗錢、量化交易）的需求龐大，形成天然的AI應用場景。第三，橋樑地位——香港可連接內地的龐大算力、數據和市場，同時維持普通法制度及國際規範，是AI企業開拓大中華市場的理想跳板。第四，政府投資——香港人工智能研發院（$10億）、前沿科技研究支援計劃（$30億）及人工智能資助計劃（$30億）反映政府的財政承諾。

【競爭劣勢】第一，本地市場細小，AI應用的規模效益有限，難以獨自支撐龐大的AI研發生態；第二，《個人資料（私隱）條例》（PDPO）相對陳舊，未能應對AI時代的數據治理需求；第三，與新加坡相比，政府數碼化的速度較慢，缺乏足夠的「公共AI應用場景」供企業測試；第四，高租金及生活成本令AI初創的營運成本偏高。

【我的建議】政府應以河套區作為「監管沙盒」，大膽試驗跨境數據流通及AI監管創新，以彌補市場細小的局限。`},
  {id:32,t:"ai",color:"#06B6D4",label:"🤖 AI政府",q:`政府推動「數智化轉型」，你認為公務員如何應對AI帶來的工作轉變？`,a:`AI對公務員工作的影響已是現在進行式，作為有志加入公務員體系的應試者，我認為必須以積極開放的態度面對這一轉變。

【AI對公務員工作的影響】政府推出「AI效能提升組」，目標是推動各部門引入AI工具，提升行政效率。可預見的影響包括：重複性文書工作（如整理數據、起草標準信件、核實申請資格）大量減少；決策支援能力提升（AI可快速分析大量資料提供政策選項）；公共服務互動方式轉變（更多市民使用AI聊天機械人而非親身求助）。2026預算案宣布每年削減2%公務員編制，預計累計削減約1萬個職位，反映政府確實預期以AI提升效率、減少部分人手需求。

【公務員的應對策略】我認為應對AI轉變需要三方面的準備：第一，主動學習AI工具——不需要成為技術專家，但要理解AI工具的能力與局限，知道如何有效利用它來輔助工作，而非被它取代；第二，培養「不可被取代」的能力——批判性思維、跨部門溝通、利益相關者管理、複雜判斷和政治敏感度，這些是AI暫時難以替代的核心公務員能力；第三，接受持續培訓——政府已承諾在數智化轉型中提供培訓資源，應積極參與，保持競爭力。

【我的態度】我認為AI是工具而非威脅，能夠善用AI的公務員，可以把時間投放在更有創意和更具影響力的工作上，為市民提供更好的服務。`},
  {id:33,t:"ai",color:"#06B6D4",label:"🤖 AI政府",q:`AI在公共行政上的應用有何潛在風險？政府應如何監管？`,a:`AI在公共行政的應用帶來效率提升的同時，也引入了需要認真對待的倫理和監管風險，政府有責任制定清晰的規範框架。

【主要風險分析】第一，演算法偏見（Algorithmic Bias）——若AI系統的訓練數據本身存在偏見（如種族、性別、社經地位），其決策可能對特定群體造成系統性不公平。例如，若AI被用於審批社會福利申請，其決定是否公正、透明，直接影響弱勢市民的基本權益。第二，數據私隱風險——政府部門持有大量市民的敏感個人資料，AI系統的訓練和運作可能帶來數據洩露或未經授權使用的風險。現行《個人資料（私隱）條例》制訂於1996年，未能有效規管AI時代的數據處理方式。第三，問責缺失——傳統行政決定由人作出，可追責；但若AI作出決定，「誰負責」的問題尚未釐清。第四，就業衝擊——AI自動化可能取代部分基層公務員職位，若無妥善安置，影響相關員工的生計。

【監管建議】我認為政府應建立「AI政府應用守則」，明確規定：高風險決策（如社福審批、執法等）必須有人審核，AI只能輔助而非取代人的最終判斷；建立AI決策的「解釋權」，市民有權要求說明AI決定的理由；同時更新PDPO以應對AI時代的數據治理需求。

【我的立場】負責任的AI應用，必須以「以人為本」為設計原則——科技應服務於人的福祉，而非反過來令人受科技所支配。`},
  {id:34,t:"ai",color:"#06B6D4",label:"🤖 AI政府",q:`香港如何利用AI提升公共服務質素？請舉具體例子說明。`,a:`AI在提升公共服務方面確實大有潛力，全球各地政府已有不少成功案例可供香港參考，以下從幾個具體範疇說明。

【醫療服務】醫管局已在部分醫院試行AI輔助診斷，如AI分析X光片及電腦掃描圖像，協助放射科醫生更快發現異常，提高診斷效率。在醫護人手嚴重短缺（預計2030年醫生短缺1,570名、護士短缺9,500名）的背景下，AI輔助診斷可緩解人手壓力，縮短輪候時間。

【社會福利申請】現時綜援及各項津貼的申請程序繁複，大量文件核實工作佔用社工人手。引入AI自動核對申請者資料（如收入、資產、家庭狀況），可大幅縮短審批時間，讓有需要的市民更快獲得援助。新加坡的「MyInfo」系統已成功整合政府數據庫，市民申請政府服務毋須重複填寫資料，值得香港借鑑。

【交通管理】運輸署可利用AI分析實時交通數據，優化交通信號燈時序，減少城市塞車。路政署亦可利用AI分析道路損耗數據，提前預測維修需要，減少緊急搶修的成本。

【市民服務及查詢】「1823」熱線引入AI聊天機械人，可全天候即時回應常見查詢，把人手集中在複雜個案處理，提升整體服務效率。

【成功落實的關鍵】我認為關鍵在於以「小規模試點→評估效果→逐步擴展」的方式推進，並確保市民知情及可以選擇繼續使用人工服務，避免數字排斥（digital exclusion）問題。`},
  {id:35,t:"ai",color:"#06B6D4",label:"🤖 AI政府",q:`你認為香港的數碼政府發展與其他先進城市相比如何？有何差距？`,a:`香港的數碼政府發展已有相當基礎，但與全球領先城市相比，仍有明顯差距需要追趕。

【香港的現有成就】香港2024年IMD世界數碼競爭力排名全球第7位，亞太區第3位，反映整體數位生態系統的競爭力。「智方便」（iAM Smart）數碼身份平台已提供逾170項政府及機構服務，「稅務易」等電子報稅服務使用率高。

【與領先城市的差距】與新加坡、愛沙尼亞等數碼政府標杆城市比較，香港差距主要體現在：第一，跨部門數據整合不足——市民辦理不同政府服務時仍需重複提交相同資料，反映後端系統整合度低；第二，紙本程序殘留——部分政府部門（尤其地政及法庭相關程序）仍大量依賴紙本，令市民及企業不便；第三，AI政府應用相對保守——新加坡GovTech已大規模推行AI駕駛的政策分析工具及公民服務機器人，香港步伐較慢。

【改善方向】政府2026預算案撥款$1億引入業界領先技術加速數智化轉型，是正確方向但力度有限。我認為關鍵改善是建立統一的「政府數據標準平台」，強制所有部門採用統一數據格式，並允許（在安全框架下）跨部門數據共享，才能從根本提升服務一體化程度。同時應訂立清晰的「數碼優先」政策目標，例如2028年前80%政府服務可全程網上完成，以具體目標驅動改革。`},
  {id:36,t:"ridehail",color:"#F97316",label:"🚗 網約車",q:`你如何評價香港網約車合法化的決定？對的士業影響如何？`,a:`網約車合法化是香港交通政策的重要里程碑，爭議超過11年，在2025年終於完成立法，我認為這是正確但需要配套管理的政策決定。

【合法化的理據】首先，從消費者角度，網約車提供透明定價、GPS追蹤、評分機制及便捷電子支付，市民長期反映使用體驗優於傳統的士，合法化符合市民利益。其次，長期維持法律灰色地帶（Uber雖被多次檢控但執法不一）對法律尊嚴有損，亦對乘客的保障存在隱患。第三，交通服務多元化符合「以科技改善民生」的施政方向。

【對的士業的衝擊】全港逾4萬名的士從業員確實面對實質衝擊，的士牌照歷史高峰約700萬元，合法化後牌照價值預期大跌，對以牌照作退休保障的車主損失重大。然而，的士業的結構性問題（司機平均年齡偏高、缺乏數字化服務、拒載及服務質素投訴多年居高）使其長期競爭力本已脆弱，合法化只是加速了已發生的市場轉變。

【監管安排的評估】政府採用雙重領牌制度（司機品格審查+指定培訓，平台向運輸署領牌+強制保險），是相對嚴謹的監管框架，比部分地區更審慎。然而，執法資源是否足夠處理未領牌者仍是疑問。

【我的建議】政府應設立「的士業轉型基金」，為願意轉型為認可網約車司機的業者提供培訓及過渡期收入補貼，確保業界人士有公平的轉型機會。`},
  {id:37,t:"ridehail",color:"#F97316",label:"🚗 網約車",q:`網約車合法化後，政府應如何保障乘客及司機的利益？`,a:`網約車合法化為乘客帶來更多選擇，但同時需要完善的監管框架保障各方利益，政府扮演不可或缺的角色。

【乘客保障】現行監管要求平台提供強制第三者保險，是保障乘客安全的基本底線。政府應進一步要求：第一，所有網約車車輛定期接受安全檢驗，標準不低於現行的士；第二，平台投訴機制須有明確的處理時限，並須向運輸署定期匯報投訴數據；第三，規範「動態定價」（surge pricing）的上限，防止節日或惡劣天氣時乘客被過度收費。

【司機保障】網約車司機的法律地位在全球均存在爭議。英國最高法院2021年裁定Uber司機屬「工人」（worker）而非獨立承包商，享有最低工資及帶薪假期保障。香港目前司機被視為獨立承包商，不受《僱傭條例》保護。我認為政府應研究設立適合零工經濟的「第三類就業保障」，讓司機在靈活工作的同時，亦能獲得基本的工傷及最低收入保障。

【防止市場壟斷】若單一平台（如Uber）主導市場，其定價能力過大，長遠可能損害消費者利益，形成另一種壟斷。競爭事務委員會應密切監察市場，確保多個平台有公平競爭的環境，讓市場機制真正發揮作用。`},
  {id:38,t:"ridehail",color:"#F97316",label:"🚗 網約車",q:`網約車與的士如何可以長遠共存？`,a:`網約車與的士的長遠共存，需要兩者各自找到差異化定位，政府亦需扮演積極的促進角色，而非放任「弱肉強食」的市場競爭。

【差異化定位的機會】的士業其實仍有其獨特優勢，可以在以下方面建立差異化：第一，路邊即時截停——這是網約車平台暫時無法複製的服務，在繁忙地區（如尖沙咀、銅鑼灣）對趕時間的乘客仍有價值；第二，無障礙服務——政府可為的士業界提供改裝補貼，鼓勵增加輪椅友善的士，服務行動不便的乘客，此乃網約車司機較少願意承接的服務；第三，長途機場接送的固定費用安排——網約車的動態定價對長途接送的預算不確定性較高，的士的計程收費對部分乘客更透明。

【的士業數字化】政府可資助的士業界建立統一的叫車App，提供與網約車相近的用戶體驗（包括預估費用、司機位置追蹤），讓乘客有真正對等的比較選擇，而非只能選擇網約車平台。

【政府的角色】我認為政府應以「管理競爭，促進服務質素」為目標，而非保護任何一方的既得利益。同時，必須確保的士業轉型支援措施到位，讓有意轉型的從業員有足夠資源和時間調適，才是負責任的政策態度。`},
  {id:39,t:"budget",color:"#A855F7",label:"📊 財政預算",q:`2026年財政預算案由赤字轉為盈餘，你如何評估香港的財政健康狀況？`,a:`2026年預算案錄得$29億盈餘，是2021-22年度以來首次，表面上是一個正面信號，但深入分析後，香港財政的結構性挑戰並未消失。

【表面改善】2025-26年度預計綜合盈餘$29億，主要受惠於印花稅收入大增72%至$995億（遠超預算），以及政府將創科種子基金等投資組合的約$620億收益回撥至一般收益帳。

【結構性挑戰】然而，幾個隱憂值得關注：第一，地價收入僅$175億，較預期低17%，反映土地市場持續疲弱，政府傳統的重要收入來源萎縮；第二，盈餘高度依賴資產市場的印花稅，若股市或樓市出現逆轉，稅收將大幅波動，財政缺乏穩定的基礎；第三，政府同期宣布從外匯基金轉撥$1,500億（未來兩年各$750億），加上每年發行$1,600億至$2,200億債券，未來債務利息及償還壓力龐大（2027-28年度償還債券款項約$1,299億，較2025-26年度$517億急升150%）。

【財政儲備】2026年3月底財政儲備約$6,572億，目標2031年達$7,337億，按現時計劃勉強維持，但沒有太多緩衝空間應對突發需求。

【我的評估】我認為香港財政狀況是「脆弱的穩定」——現時看似持續，但對資產市場高度敏感，若外圍環境轉壞（如全球衰退、中美貿易戰升溫），財政壓力可以迅速惡化。政府需要盡快推進稅基多元化，減低對印花稅及地價的過度依賴。`},
  {id:40,t:"budget",color:"#A855F7",label:"📊 財政預算",q:`你認為政府的「派糖」措施（如退稅、差餉寬免）是否善用公共資源？`,a:`「派糖」措施（如退稅、差餉寬免、綜援雙糧）是香港預算案的慣常元素，我認為其政策效果值得認真檢視，不應只視為必然之舉。

【現時「派糖」規模】2026預算案的主要「派糖」措施包括：薪俸稅及利得稅退稅$3,000（惠及約209萬納稅人，總成本約$54億）；住宅差餉寬免首兩季各$500（按戶計算，惠及所有業主）；綜援、長者生活津貼、高齡津貼及傷殘津貼各發放額外1個月標準金額。

【正面意義】在經濟不景氣或市民生活壓力大的時期，「派糖」有助增加消費、刺激短期經濟活動，並向市民傳達政府與民共苦的訊息，具有政治意義。對低收入群體的定向支援（如雙糧）更有切實幫助。

【問題所在】然而，廣泛的退稅及差餉寬免屬「人人有份」式政策，受益最大的是較富有的納稅人（退稅金額較大）及業主（差餉寬免）。若將相同資源投放於公共醫療、教育或基層福利服務，可能產生更大的社會效益。批評者形容此類「派糖」措施為財政紀律鬆弛的表現，且無助解決任何根本性問題。

【我的觀點】我認為「派糖」不應成為預算案的必然成分，資源分配應以「最有需要的群體」為優先——如果要紓困，應針對低收入家庭和弱勢群體，而非廣泛的普惠式措施。香港財政資源有限，應以精準為原則，善用每一分公帑。`},
  {id:41,t:"budget",color:"#A855F7",label:"📊 財政預算",q:`政府大規模發行債券為基建融資，你對這種做法有何看法？`,a:`政府大規模發行債券為基建融資，是近年香港財政政策的重大轉變，有其理據，但亦需謹慎管理風險。

【政策背景】2026預算案宣布未來5年每年發行$1,600億至$2,200億債券，同時從外匯基金轉撥$1,500億（未來兩年各$750億）至基本工程儲備基金，以支援北都、啟德發展、鐵路等龐大基建項目。

【發債融資的理據】長期基建項目的受益期往往長達50至100年，透過發債將成本分攤至未來世代，符合「代際公平」（intergenerational equity）原則——未來受益於基建的世代，理應分擔部分建設成本。同時，現時利率環境相對可控，適時利用債務融資可避免完全依賴稅收，減少對短期財政的衝擊。

【風險管理】然而，政府亦需嚴格管理風險：第一，利息成本——大規模發債意味未來每年需支付龐大利息，2027-28年度償還債券款項約$1,299億，佔政府開支的相當比例；第二，財政紀律——若發債「開口子」形成常態，政府可能逐漸依賴借貸支付日常開支，而非只用於投資性基建，動搖財政根基；第三，評級風險——評級機構（如標普、惠譽）已表示將關注香港的債務走勢，若評級下調，借貸成本將上升，形成惡性循環。

【我的立場】我支持以發債支援具明確效益的長遠基建投資（如北都交通）。但政府必須確保資金用途嚴格限於投資性支出，同時公開透明地披露每個項目的財務回報預測，讓立法會和公眾可以有效監督。`},
  {id:42,t:"budget",color:"#A855F7",label:"📊 財政預算",q:`在財政壓力下，政府計劃削減公務員編制，你認為對公共服務有何影響？`,a:`政府計劃每年削減2%公務員編制，預計2026-27及2027-28年度合共削減約1萬個職位，這是一項需要謹慎管理的政策。

【削減的理由】政府的立場是，隨著AI及數位化技術的普及，部分重複性行政工作可以由科技取代，令較少人手可提供同等或更好的服務。這一理念在原則上是合理的——若科技真的可以提升效率，便不應固守傳統的人手配置。

【現實的憂慮】然而，現實執行面臨多個挑戰：第一，AI轉型需時，若在技術尚未成熟前已削減人手，將直接影響服務交付能力；第二，部分公共服務（如社工服務、護理服務、執法工作）涉及複雜的人際判斷，難以完全由科技取代，這些領域的人手削減將直接影響服務質素；第三，醫護、社福等部門本已嚴重人手短缺，進一步削減將造成不可承受的壓力。

【作為公務員的準備】作為有志加入公務員體系的應試者，我認為應對這一轉變的最佳方式是積極學習科技工具，成為「懂得利用AI的公務員」，而非被AI取代的公務員。政府亦應為受影響員工提供再培訓機會，確保職位調整是「升級轉型」而非單純裁員。

【問責機制的重要性】我認為政府必須訂立明確的服務水平指標（SLA），在削減人手的同時，定期公開服務表現數據，確保市民的公共服務體驗不受損害，才是負責任的改革。`},
  {id:43,t:"manpower",color:"#F43F5E",label:"🩺 醫護人手",q:`香港醫護人手嚴重短缺，你認為最有效的解決方案係咩？`,a:`香港醫護人手短缺是公共醫療體系最迫切的結構性危機。現時每千人口僅2.1名醫生，遠低於OECD平均的3.5名；預計2030年醫生短缺1,570名，護士短缺更達9,500名。近三年，逾1,200名醫生及7,300名護士以非退休方式離職，問題愈見惡化。

【短期措施——引進海外醫護】2021年推行的「特別註冊安排」容許在認可海外醫學院畢業的醫生，無須通過本地執照考試，在公營機構執業。非本地培訓醫生在政府機構就業人數由2022年67名增至2023年底124名，近乎倍增，是正確方向，但規模仍遠不足以填補缺口。「大灣區醫療人才交流計劃」引入9名大灣區專科醫生及70名護士，同樣屬補充性措施。

【中期措施——增加培訓】醫科培訓學額已由2022/23年度的530個增至目標2025/26年度的650個，但培訓期需時約10至15年，遠水難救近火。北都牛潭尾第三所醫學院的規劃，是長遠增加本地培訓的最重要舉措，惟落成時間不確定，最快2030年代初才能招生。

【根本問題——改善留人】然而，我認為解決短缺的根本不是單靠增加輸入，而是減少流失。公私院薪酬差距過大、工作量過重是離職的主要原因。政府必須系統性改善公院薪酬架構，訂立最低人手比例標準，才能真正留住人才，讓培訓和引進的成效得以積累。`},
  {id:44,t:"manpower",color:"#F43F5E",label:"🩺 醫護人手",q:`引進海外醫生是否有損本地市民的醫療安全？你如何平衡這個問題？`,a:`引進海外醫生的政策在醫療安全與紓緩人手短缺之間存在張力，需要透過嚴格的質素保障機制加以平衡。

【香港醫學會的憂慮】香港醫學會對引進海外醫生持保留態度，擔心不同地區的醫學培訓標準差異可能影響診療質素，亦有人指出此中存在業界保護的利益考量。

【公眾的需要】另一方面，公立醫院穩定新症輪候時間最長達180星期（約3年半），部分患者等待期間病情惡化甚至離世，這本身就是對醫療安全的嚴重威脅。「什麼都不做」同樣危害公眾健康。

【現行機制的保障】「特別註冊安排」已設有質素保障措施：只接受政府認可的海外醫學院名單（包括頂尖大學），並要求在公營機構服務最少5年（在監督下工作），期滿後才可申請正式本地執照。這一設計在開放引進的同時，維持了實踐中的質素監察。

【我的平衡觀點】我認為醫療安全應是不可妥協的底線，但應透過嚴格的「程序保障」（如前述的認可名單、督導機制）而非「數量限制」來確保。同時，政府應定期審視引進醫生的服務質素數據（如投訴率、臨床表現等），並公開透明地向公眾匯報，以實證回應社會對醫療安全的關切，建立公眾信心。`},
  {id:45,t:"manpower",color:"#F43F5E",label:"🩺 醫護人手",q:`護士短缺比醫生問題更嚴峻，但受到的關注較少，你的看法如何？`,a:`這是一個重要但被公眾忽視的問題，我完全同意護士短缺的嚴峻程度被大大低估。

【數字說明問題】預計2030年護士短缺約9,500名，差距需求比率達17.1%，遠超醫生的5.4%。近三年逾7,300名護士以非退休方式離職，比醫生的1,200名多出約六倍。公立醫院部分病房的護士對病人比例已超出安全指引，直接影響護理質素及病人安全。

【護士短缺的深層原因】第一，薪酬較私家醫院及私家診所低，流失率高；第二，輪班工作、高壓工作環境令工作吸引力下降，尤以疫情後離職潮最為明顯；第三，護士培訓名額增加速度不及流失速度；第四，部分護士移民離港。

【媒體關注不足的原因】醫生短缺較容易被市民感受（直接反映在長輪候時間），而護理質素的下降（如換藥頻率減少、觀察時間縮短）較難量化，也未必即時引起投訴，因此公眾感知程度較低。

【需要的改革】我認為政府應為護士設立獨立的薪酬及晉升架構，擴大高級執業護士（APN）的職能範圍，讓護士可獨立診治部分常見疾病，提升職業吸引力和地位。同時應大幅增加護理學院學額，並研究為在職護士提供帶薪進修機會，作為留任的激勵。`},
  {id:46,t:"manpower",color:"#F43F5E",label:"🩺 醫護人手",q:`基層醫療發展如何緩解公立醫院人手壓力？`,a:`加強基層醫療是緩解公立醫院擠迫問題的根本策略，也是現屆政府「醫療改革藍圖」的核心方向，我認為這是正確的政策路徑。

【現時問題的根源】公立醫院人手嚴重不足（醫生0.9名/千人，私家醫生4.5名/千人），但承擔了全港近90%的醫療服務，主要原因之一是缺乏有效的基層醫療分流機制，使大量可在社區處理的輕症及慢性病患者流入急症室和門診，佔用本應用於重症的資源。

【慢病共治計劃的成效】2023年底推出的「慢病共治計劃」讓高血壓和糖尿病患者在私家診所接受政府資助的跟進治療，潛在可分流約40萬名公院穩定病人。配合「基層醫療健康藍圖」推動「家庭醫生」作為市民健康守門人，是正確方向。

【地區康健中心的角色】各區康健中心提供預防性健康服務、慢病管理及轉介，有助減少可預防住院個案，是基層醫療發展的重要組成部分。

【挑戰——私家診所參與意願】「慢病共治計劃」的成效取決於足夠的私家醫生願意以政府資助的收費水平參與計劃。若參與的私家醫生不足，公院的壓力難以有效分流。政府應研究如何提高私家醫生的參與誘因，包括簡化行政程序及確保合理的資助金額。

【長遠目標】我認為香港應以「初級醫療覆蓋率」（Primary Care Coverage）作為具體政策指標，目標在2030年前令70%的常見慢性病患者在私家基層醫療中接受跟進，才能真正緩解公院壓力。`},
  {id:47,t:"labour",color:"#84CC16",label:"👷 勞工政策",q:`你認為香港應否引入標準工時立法？`,a:`標準工時立法是香港勞工政策長期懸而未決的重要議題，我認為適當的工時規管不只是保障工人，亦有利社會整體發展。

【現狀的問題】香港缺乏法定標準工時，是全球主要城市中的少數例外。香港僱員每週工時中位數約50小時，全球最高之一，長期工作文化令工人難以兼顧家庭責任（直接影響生育率）、損害身心健康（職業倦怠問題嚴峻）及限制休閒消費（影響內需市場）。

【支持立法的理由】第一，保障工人基本尊嚴：「工作以外的生活」是現代勞工權利的基本組成，香港的超長工時文化令不少工人失去個人及家庭生活。第二，提升生產效率：研究顯示，過長工時實際上降低生產效率，「少即是多」——適當休息的工人，其工作質素往往高於長期疲勞的工人。第三，緩解生育率危機：工時過長被認為是香港低生育率的重要結構性原因之一（養育子女需時間）。

【反對聲音的回應】商界擔憂標準工時增加勞動成本和減低靈活性。對此，我認為政府可採用「彈性標準工時」模式，即規定每週最高工時（如50至55小時），超時需支付超時補償，而非強制每週只能工作44小時，在保障工人同時維持彈性。

【我的立場】我支持香港推行標準工時立法，以循序漸進的方式（先在政府部門帶頭示範，再逐步推廣至私人機構），讓工時文化改變成為可能。`},
  {id:48,t:"labour",color:"#84CC16",label:"👷 勞工政策",q:`外傭政策是否公平？香港應否改革外傭制度？`,a:`外傭政策是香港勞工政策中最具爭議的議題之一，牽涉本地勞工利益、外傭權益及家庭護理需求，需要多角度均衡分析。

【外傭在港的重要性】香港現有約34萬名外籍家庭傭工，主要來自菲律賓及印度尼西亞，是香港家庭、特別是有幼兒或老人的雙職家庭的重要支柱。若沒有外傭，香港的女性勞動參與率及整體生育率可能更低。

【制度的爭議】外傭制度的主要爭議點包括：第一，「住家要求」——外傭被要求與僱主同住，這一要求限制了外傭的私人空間和個人自由，被人權組織批評有損個人尊嚴；第二，「兩星期規則」——外傭合約終止後須在兩星期內離港，被批評令外傭不敢舉報僱主的虐待行為；第三，外傭不適用《最低工資條例》，現行月薪最低保障金額（MAS，約$4,870）遠低於本地最低工資水平，被批評構成歧視。

【改革建議】我認為在維持外傭政策基本框架的同時，應考慮：延長合約終止後可留港時間至一個月，讓外傭有足夠時間就不公平對待提出申訴；加強監察及執法機制，確保外傭的法定休息日及休假得以落實；設立獨立的申訴渠道，保障外傭在不懼被即時遣返的情況下表達意見。外傭的尊嚴和基本權益受到保護，香港的國際形象亦因此受益。`},
  {id:49,t:"labour",color:"#84CC16",label:"👷 勞工政策",q:`你認為「輸入勞工計劃」對香港本地工人有何影響？政府應如何平衡？`,a:`輸入勞工計劃是回應特定行業人手短缺的政策工具，但需要在紓緩行業壓力與保護本地就業之間取得適當平衡，政策設計極為關鍵。

【計劃背景】2023年，政府推出建造業和運輸業輸入勞工計劃，以及「補充勞工優化計劃」，回應多個行業反映的人手短缺。建造業尤為迫切，因大型工程（包括北都、啟德、鐵路等）對技術勞動力需求龐大，而本地建造業工人供應不足。

【本地工人的憂慮】工會及本地工人反對輸入勞工，擔憂：第一，壓低工資——外勞增加供應，削弱本地工人的議價能力；第二，替代效應——若僱主可輸入外勞，便減低改善工作條件的誘因；第三，影響就業機會——特別是對低技術本地工人的衝擊最大。

【政府的平衡機制】政府設有「本地工人優先」原則，僱主須先嘗試招聘本地工人，並符合一定的本地對外勞工人比例，方可申請輸入外勞。然而，此機制的執行和監察需要嚴格，否則容易流於形式。

【我的觀點】我認為輸入勞工可以作為短期的補充措施，但更根本的解決在於提升行業吸引力——改善工作環境、薪酬及安全標準，才能從根本上解決本地工人供應不足的問題。與此同時，政府應加大投資於職業再培訓，讓已失業或轉行的工人有機會學習新技能，進入新興行業。`},
  {id:50,t:"labour",color:"#84CC16",label:"👷 勞工政策",q:`在人工智能普及的背景下，香港的勞工政策應如何應對就業市場的轉變？`,a:`人工智能對就業市場的衝擊是全球性的結構性挑戰，香港作為高度依賴服務業的金融中心，既面對風險，亦具備適應的基礎。

【香港就業市場的脆弱點】國際勞工組織估計，全球約14%的工作面臨被AI高度自動化的風險。香港集中於金融、法律、會計等行業，雖然部分崗位技術含量高，但大量的資料核驗、文件整理、基礎分析等工作同樣面臨AI取代的威脅——這些工作恰恰是許多中層白領的主要工作內容。基層服務業（如收銀員、客服人員）亦受到自助化和AI的衝擊。

【政府的政策回應】現時政府的「AI效能提升組」主要聚焦政府部門的AI應用，對整體就業轉型的配套較為不足。2026預算案的公務員削編計劃（每年2%，合共約1萬個職位）反映政府已預期以AI減少部分人手，但再培訓及安置的配套並不清晰。

【我的政策建議】第一，設立「AI就業轉型基金」——為受AI影響的在職工人提供免費再培訓課程，聚焦AI時代需求量大的技能（如數據分析、AI系統管理、創意及人際技能）；第二，建立「技能預測機制」——定期分析未來五至十年的職位需求，前瞻性調整大學和職業培訓課程；第三，推廣「AI協作」文化——鼓勵工人學習如何與AI工具配合，而非被其取代，培訓的定位應是「人機協作」而非「人機對立」；第四，研究基本收入補貼——作為長遠的社會保障選項，應對就業結構的根本性轉變。`},
  {id:51,t:"youth",color:"#14B8A6",label:"🎓 青年發展",q:`你認為香港年輕人面對的最大挑戰係咩？政府又有何措施應對？`,a:`香港年輕人面對的挑戰是多元且相互交織的，需要政府跨部門的協調政策回應，而非零散的個別措施。

【住屋困難】住屋是大多數香港年輕人首要的生活壓力。樓價與收入比率達13至15倍，首置門檻極高；公屋輪候時間仍達5.1年，年輕單身人士更難獲配公屋。政府雖推出「白居二」（7,000個，一半撥予40歲以下）及「家有初生」優先計劃，但供應仍遠不足以滿足需求。

【就業與向上流動】雖然香港整體失業率維持低位（約3%），但年輕人（15至24歲）失業率往往是整體的兩至三倍。更深層的問題是「向上流動」受阻——學歷通脹令大學學位的職業回報下降，不少大學畢業生從事收入偏低的職位，未能發揮所學。

【精神健康】疫情後，年輕人的精神健康問題惡化，學生自殺率及焦慮症個案增加，社會支援網絡不足。

【政府的措施】「青年發展藍圖」（2022年）是首份全面的青年政策框架，提出逾200項措施，涵蓋就業、住屋、教育及公民參與。北都的發展亦被定位為年輕一代的機遇（就業及住屋）。政府亦推出「大灣區青年就業計劃」，資助香港青年在大灣區工作，拓闊視野。

【我的觀點】我認為政府的政策框架有了，但執行的速度和力度仍需加強。最重要的是讓年輕人感受到「努力仍有出路」，建立公平向上流動的希望感，才是解決根本問題的關鍵。`},
  {id:52,t:"youth",color:"#14B8A6",label:"🎓 青年發展",q:`大灣區對香港年輕人的機遇和挑戰各是什麼？`,a:`大灣區為香港年輕人提供了空間和機遇，但同時帶來適應挑戰，需要香港年輕人以開放但清醒的眼光看待。

【大灣區的機遇】大灣區總人口約8,600萬，GDP約13兆元人民幣，是全球最具活力的城市群之一。對香港年輕人而言，機遇包括：第一，廣闊的就業市場——深圳的科技業、廣州的貿易及製造業、佛山的智能製造等，提供香港本地缺乏的創科及製造業就業機會；第二，相對低廉的生活成本——在大灣區城市生活的成本（尤其房屋）遠低於香港，讓年輕人有更大的財務空間嘗試創業或在新領域發展；第三，政策支持——「大灣區青年就業計劃」（每月補貼$18,000至$26,000）及內地多個青年創業基地的資助，為赴灣區發展的年輕人提供財政支援。

【挑戰與顧慮】然而，挑戰亦是實在的：第一，兩地制度差異（法律、稅務、社保制度）令年輕人在大灣區工作時面臨複雜的跨境事務；第二，部分香港年輕人不習慣普通話工作環境，或對內地職場文化（如996工作制）不適應；第三，大灣區的就業機會多集中於理工科，對人文及社會科學背景的年輕人吸引力有限；第四，遠離香港的家庭和社交圈，對年輕人的社會支持網絡是挑戰。

【我的建議】我認為大灣區是擴闊視野的平台而非「逃離香港」的出口。政府應提供更全面的資訊和配套（如兩地稅務諮詢、社保銜接），讓有意嘗試的年輕人可以「有備而往」，同時降低若不適應而回港的成本。`},
  {id:53,t:"youth",color:"#14B8A6",label:"🎓 青年發展",q:`青年精神健康問題日益嚴重，你認為政府和社會應如何回應？`,a:`青年精神健康是近年香港最值得高度重視的社會問題之一，需要政府、學校、家庭及社區的協同回應，而非任何一方獨自承擔。

【問題的嚴峻程度】疫情後本港學生的焦慮、抑鬱個案顯著增加，學生自殺率在部分年份創歷史新高，引起社會廣泛關注。根據香港大學「防止自殺研究中心」的研究，精神健康問題的年輕化趨勢明顯，且往往與學業壓力、就業前景焦慮及社會疏離感相關。

【現時支援不足】現時公立醫院兒童及青少年精神科輪候時間極長（穩定個案等候逾兩年），學校的輔導服務人手不足（每名社工需服務的學生人數遠超國際標準），社區中心的精神健康服務地區分佈不均。

【政策建議】第一，增加公立醫院精神科資源，特別是兒童及青少年服務，縮短輪候時間至三至六個月以內；第二，強制每所中小學配備足夠的社工及輔導員人手（如每600名學生最少一名全職社工）；第三，推動「全校精神健康文化」（Whole-School Mental Health Approach），將精神健康教育納入課程，消除精神健康的污名化；第四，培訓「朋輩支援大使」，讓年輕人以同齡朋輩角度互相支援，研究顯示朋輩支援對青少年精神健康的效果不遜於專業輔導。

【社會層面】我認為更重要的是重建年輕人對未來的希望感——住屋問題、就業前景、向上流動機會的改善，從根本上減輕年輕人的結構性壓力，才是精神健康問題的長遠解方。`},
  {id:54,t:"youth",color:"#14B8A6",label:"🎓 青年發展",q:`你認為現時的教育制度能否有效培訓香港未來所需的人才？`,a:`香港的教育制度近年進行了多項改革，但我認為在培訓未來人才方面仍有根本性的改善空間，特別是在創新思維和跨學科能力的培養上。

【現時制度的問題】香港教育制度長期被批評為「考試主導」（examination-driven），學生從小學起已面對持續的評估壓力（TSA/BIPST、文憑試等），傾向「死記硬背」而非深度理解和批判性思維。大學入學的高競爭壓力令學生集中於「分數最高效率的科目」，而非跟隨興趣或探索潛能。

【與未來人才需求的差距】AI時代對人才的要求正在深刻改變：記憶性知識可由AI即時檢索，企業更需要具備創意解決問題、批判性分析、跨文化溝通及適應性學習的人才。現時教育制度培訓的是「答題能手」，而非「問題解決者」。

【正面改革方向】近年改革包括：STEM教育（科技、工程、數學）的課程強化；生涯規劃教育的引入；「應用學習」（Applied Learning）科目提供職業技能培訓；以及2026年大學資助名額擴至約8,500個，提升高等教育普及率。

【我的建議】我認為最重要的改革是「評估模式轉型」——減少「一試定生死」的比重，增加專題研習、跨學科項目、社區服務等多元評估，讓學生在追求分數的同時，也能發展解決真實問題的能力。這是讓香港教育制度真正服務於未來社會需求的根本改革。`},
  {id:55,t:"youth",color:"#14B8A6",label:"🎓 青年發展",q:`你認為香港應如何加強青年的公民參與和對社會的歸屬感？`,a:`公民參與和社會歸屬感是年輕一代對社會作出貢獻的前提，也是社會穩定的重要基礎，政府和民間社會均有責任共同推動。

【問題的背景】香港近年社會事件後，不少年輕人對社會的歸屬感有所下降，部分對政治參與持冷漠態度，亦有部分選擇移民。如何在新的政治環境下，重建年輕一代對社會的正面連結，是政府施政的重要課題。

【政府的現行措施】「青年發展藍圖」（2022年）包含多項促進公民參與的措施，如設立「青年內地交流資助計劃」（鼓勵了解國家發展）及「青年委員自薦計劃」（鼓勵青年擔任政府諮詢委員會成員）。政府亦推動「愛國主義教育」，在課程中加強對國家歷史和成就的了解。

【我的補充看法】我認為單靠「由上而下」的政府主導計劃難以真正建立歸屬感，更重要的是：第一，解決年輕人面對的實質問題（住屋、就業、向上流動），讓他們感受到社會公平；第二，提供真正的「有效參與」渠道——讓年輕人可以就政策提出意見，並感受到意見被認真對待；第三，支持年輕人主導的社區計劃，讓他們透過實際服務和貢獻建立對社區的擁有感。

【結語】歸屬感源於感覺自己是社區的重要一分子，並有能力影響自身所在的社會。政府應創造條件讓年輕人主動參與社會建設，而非只是政策的被動接受者。`},
  {id:56,t:"youth",color:"#14B8A6",label:"🎓 青年發展",q:`你認為香港的職業教育（VPET）是否受到足夠重視？應如何改善？`,a:`職業教育及培訓（VPET）在香港長期受到「學術霸權」的影響而被低估，是香港人才培育體系的重大缺口，急需提升地位和投入。

【問題所在】香港社會長期存在「大學優先、職訓次之」的觀念，家長和學生傾向以入讀大學為目標，職業訓練局（VTC）及各職業資歷課程被視為「學術失敗者的出路」，而非有價值的職業發展路徑。結果是：一方面大量大學畢業生從事與專業不符的工作；另一方面，建造業、餐飲業、護理業等行業嚴重缺乏技術工人，制約了香港的發展潛力。

【現時政策的不足】政府雖設有職業訓練局（VTC）及多個行業培訓計劃，但整體資源投入與大學教育相比仍差距懸殊。雇主對職訓資歷的認可度不足，令工人即使完成培訓，亦未必獲得相應薪酬提升。

【改善建議】第一，「雙軌並重」的教育定位——在中學課程中加強職業探索，讓學生在15至16歲已開始了解不同職業路徑，而非所有人均以大學入學為唯一目標；第二，建立「職業資歷框架」（QF）的公眾認知度——讓僱主和市民了解不同職業資歷的水準和含金量，提升社會對職訓資歷的尊重；第三，參考德國「雙元制」（Duales System）職業教育模式，由學校與企業合作培訓，讓學生邊學習邊實踐，大幅提升培訓的實用性和就業率；第四，確保職訓畢業生可在行業中獲得「職業尊嚴」和合理薪酬，從根本上提升職訓的吸引力。`},
];
const TOPIC_COLORS={"housing":"#3B82F6","birth":"#EC4899","ageing":"#F59E0B","northern":"#8B5CF6","medfee":"#EF4444","minwage":"#10B981","ai":"#06B6D4","ridehail":"#F97316","budget":"#A855F7","manpower":"#F43F5E","labour":"#84CC16","youth":"#14B8A6"};
const TOPIC_LABELS={"housing":"🏠 房屋","birth":"👶 生育率","ageing":"👴 人口老化","northern":"🏙️ 北都","medfee":"🏥 醫療收費","minwage":"💰 最低工資","ai":"🤖 AI政府","ridehail":"🚗 網約車","budget":"📊 財政預算","manpower":"🩺 醫護人手","labour":"👷 勞工政策","youth":"🎓 青年發展"};

// Extract keywords (bold text, numbers, policy names) from answer
function extractKW(answer){
  const patterns=[
    /\*\*(.+?)\*\*/g,
    /【(.+?)】/g,
    /([\d,]+(?:億|萬|%|名|宗|年|月|日|元|小時|個|倍))/g,
    /(《.+?》)/g,
    /「(.+?)」/g,
  ];
  const found=new Set();
  patterns.forEach(p=>{
    let m; const r=new RegExp(p.source,p.flags);
    while((m=r.exec(answer))!==null) if(m[1]&&m[1].length<20) found.add(m[1].trim());
  });
  return [...found].slice(0,12);
}

function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
let queue=[],idx=0,flipped=false,speaking=false,filter='all',progress={};

function buildQ(f){return shuffle(f==='all'?CARDS:CARDS.filter(c=>c.t===f));}

function init(){
  document.getElementById('all-cnt').textContent=CARDS.length;
  document.getElementById('tot').textContent=CARDS.length;
  queue=buildQ('all'); render();
}

function render(){
  const cur=queue[idx]; if(!cur) return;
  const sc=cur.color;
  document.getElementById('cn').textContent=idx+1;
  document.getElementById('ct').textContent=queue.length;
  document.getElementById('qnum').textContent='#'+cur.id+'/'+CARDS.length;
  const tag=document.getElementById('ttag');
  tag.textContent=cur.label; tag.style.cssText=`color:${sc};background:${sc}22;border:1px solid ${sc}44;`;
  const card=document.getElementById('card');
  card.style.borderColor=flipped?sc+'55':'rgba(255,255,255,.065)';
  card.style.boxShadow=flipped?`0 0 40px ${sc}18,0 20px 60px rgba(0,0,0,.5)`:'0 20px 60px rgba(0,0,0,.4)';
  document.getElementById('qt').textContent=cur.q;
  // Format answer: bold 【...】 sections
  const formatted=cur.a.replace(/【(.+?)】/g,'<strong>【$1】</strong>');
  document.getElementById('at').innerHTML=formatted;
  const show=flipped;
  ['dv','al','at'].forEach(id=>document.getElementById(id).style.display=show?'block':'none');
  if(show){
    document.getElementById('dv').style.background=`linear-gradient(90deg,transparent,${sc}55,transparent)`;
    document.getElementById('al').style.color=sc;
    // Keywords
    const kws=extractKW(cur.a);
    const kwArea=document.getElementById('kw');
    if(kws.length){
      kwArea.style.display='flex';
      kwArea.innerHTML=kws.map(k=>`<span class="kw" style="color:${sc};border-color:${sc}44;background:${sc}12">${k}</span>`).join('');
    }else kwArea.style.display='none';
  }else document.getElementById('kw').style.display='none';
  document.getElementById('hint').textContent=show?'':'輕按顯示模範答案 ↓';
  const bfl=document.getElementById('bfl');
  bfl.textContent=show?'🙈 隱藏答案':'👁 顯示答案';
  bfl.style.background=show?`${sc}20`:'rgba(255,255,255,.07)';
  bfl.style.borderColor=show?`${sc}55`:'rgba(255,255,255,.14)';
  document.getElementById('bprev').disabled=idx===0;
  document.getElementById('bnext').textContent=idx===queue.length-1?'🔀 重新洗牌':'下題 →';
  document.getElementById('rating').style.display=show?'flex':'none';
  const s=progress[cur.id];
  [['bad','😰 唔記得','#ef4444'],['ok','🤔 差不多','#f59e0b'],['good','😊 記住喇','#10b981']].forEach(([st,lb,cl])=>{
    const b=document.getElementById('rb-'+st); b.textContent=lb;
    b.style.cssText=s===st?`background:${cl}22;border-color:${cl}55;color:${cl};font-weight:700`:'background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.07);color:#475569;font-weight:400';
  });
  renderDots();
}

function flip(){flipped=!flipped;render();}
function next(){cancelSpeak();if(idx<queue.length-1)idx++;else{queue=buildQ(filter);idx=0;}flipped=false;render();}
function prev(){if(idx===0)return;cancelSpeak();idx--;flipped=false;render();}

function setFilter(f){
  filter=f;
  document.querySelectorAll('.tb').forEach(b=>{
    const a=b.dataset.id===f; b.classList.toggle('active',a);
    if(a&&f!=='all'){b.style.setProperty('--tc',TOPIC_COLORS[f]||'#3b82f6');}
  });
  queue=buildQ(f);idx=0;flipped=false;cancelSpeak();render();
}

function mark(st){
  const cur=queue[idx]; if(!cur) return;
  progress[cur.id]=st;
  document.getElementById('dn').textContent=Object.values(progress).filter(v=>v==='good').length;
  render();
}

function handleSpeak(){
  if(!window.speechSynthesis)return;
  if(speaking){cancelSpeak();return;}
  const cur=queue[idx]; if(!cur)return;
  const text=flipped?cur.a:cur.q;
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='zh-HK'; utt.rate=.88;
  const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('zh')||v.lang.startsWith('yue'));
  if(v)utt.voice=v;
  utt.onend=()=>{speaking=false;updateSpeak();};
  speechSynthesis.speak(utt); speaking=true; updateSpeak();
}
function cancelSpeak(){speechSynthesis?.cancel();speaking=false;updateSpeak();}
function updateSpeak(){
  const b=document.getElementById('bsp');
  b.textContent=speaking?'⏹ 停止':'🔊 聆聽';
  b.classList.toggle('on',speaking);
}

function togglePanel(){const p=document.getElementById('pp');p.style.display=p.style.display==='none'||!p.style.display?'block':'none';renderDots();}
function renderDots(){
  const grid=document.getElementById('dots'); grid.innerHTML='';
  CARDS.forEach(c=>{
    const s=progress[c.id];
    const d=document.createElement('div');
    d.className='dot'+(s?' '+s:'');
    d.title=c.q.slice(0,30)+'…';
    d.textContent=s==='good'?'✓':s==='ok'?'~':s==='bad'?'✗':c.id<=99?c.id:'·';
    grid.appendChild(d);
  });
  const good=Object.values(progress).filter(v=>v==='good').length;
  const ok=Object.values(progress).filter(v=>v==='ok').length;
  const bad=Object.values(progress).filter(v=>v==='bad').length;
  document.getElementById('ps').innerHTML=
    `<span style="color:#10b981">😊 記住喇：${good}</span>
     <span style="color:#f59e0b">🤔 差不多：${ok}</span>
     <span style="color:#ef4444">😰 唔記得：${bad}</span>
     <span style="color:#475569">未睇：${CARDS.length-good-ok-bad}</span>`;
  document.getElementById('dn').textContent=good;
  document.getElementById('tot').textContent=CARDS.length;
}

document.addEventListener('keydown',e=>{
  if(e.key===' '){e.preventDefault();flip();}
  else if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key==='Escape'){queue=buildQ(filter);idx=0;flipped=false;render();}
});
speechSynthesis?.addEventListener('voiceschanged',()=>{});
init();
</script>
